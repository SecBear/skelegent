[package]
name = "skg-secret-vault"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Stub secret resolver for HashiCorp Vault KV"
readme = "README.md"
categories = ["asynchronous", "authentication"]
keywords = ["skelegent", "ai", "agent", "vault", "secrets"]

[dependencies]
skg-secret = { path = "../skg-secret", version = "0.4.1" }
skg-auth = { path = "../../auth/skg-auth", version = "0.4.1" }
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
