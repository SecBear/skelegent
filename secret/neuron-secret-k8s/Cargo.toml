[package]
name = "neuron-secret-k8s"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Stub secret resolver for Kubernetes Secrets"
readme = "README.md"
categories = ["asynchronous", "authentication"]
keywords = ["neuron", "ai", "agent", "kubernetes", "secrets"]

[dependencies]
neuron-secret = { path = "../neuron-secret", version = "0.4.0" }
neuron-auth = { path = "../../auth/neuron-auth", version = "0.4.0" }
layer0 = { path = "../../layer0", version = "0.4.0" }
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
