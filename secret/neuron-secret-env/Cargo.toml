[package]
name = "neuron-secret-env"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Secret resolver that reads from process environment variables"
readme = "README.md"
categories = ["asynchronous", "authentication"]
keywords = ["neuron", "ai", "agent", "secrets", "environment"]

[dependencies]
neuron-secret = { path = "../neuron-secret", version = "0.4.0" }
layer0 = { path = "../../layer0", version = "0.4.0" }
async-trait = "0.1"
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
