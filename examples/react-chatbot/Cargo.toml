[package]
name = "react-chatbot"
version = "0.0.0"
edition.workspace = true
publish = false

[[bin]]
name = "react-chatbot"
path = "src/main.rs"

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
skg-context-engine = { path = "../../op/skg-context-engine", version = "0.4.1" }
skg-tool = { path = "../../turn/skg-tool", version = "0.4.1", features = ["macros"] }
skg-turn = { path = "../../turn/skg-turn", version = "0.4.1", features = ["test-utils"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
