[package]
name = "workflow"
version = "0.0.0"
edition.workspace = true
publish = false

[[bin]]
name = "workflow"
path = "src/main.rs"

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
skg-orch-local = { path = "../../orch/skg-orch-local", version = "0.4.1" }
skg-orch-patterns = { path = "../../orch/skg-orch-patterns", version = "0.4.1" }
async-trait = "0.1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
