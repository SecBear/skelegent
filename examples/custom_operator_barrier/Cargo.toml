[package]
name = "custom-operator-barrier"
version = "0.4.0"
edition = "2024"
authors = ["Neuron Contributors"]
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
serde_json = "1"
thiserror = "1"
layer0 = { path = "../../layer0", version = "0.4.0" }
neuron-tool = { path = "../../turn/neuron-tool", version = "0.4.0" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
