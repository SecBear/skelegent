[package]
name = "custom-operator-barrier"
version = "0.4.1"
edition = "2024"
authors = ["Skelegent Contributors"]
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
serde_json = "1"
thiserror = "2"
layer0 = { path = "../../layer0", version = "0.4.1" }
skg-tool = { path = "../../turn/skg-tool", version = "0.4.1" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
