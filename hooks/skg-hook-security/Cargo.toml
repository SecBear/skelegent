[package]
name = "skg-hook-security"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Security middleware for skelegent — redaction and exfiltration detection"
readme = "README.md"
categories = ["asynchronous", "authentication"]
keywords = ["skelegent", "ai", "agent", "security", "redaction"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"
tracing = "0.1"
regex = "1"
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
