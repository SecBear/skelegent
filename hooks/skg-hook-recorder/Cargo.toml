[package]
name = "skg-hook-recorder"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Universal operation recorder for skelegent middleware"
publish = false

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
skg-secret = { path = "../../secret/skg-secret", version = "0.4.1" }
skg-turn = { path = "../../turn/skg-turn", version = "0.4.1" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
opentelemetry = { version = "0.31.0", features = ["trace"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
