[package]
name = "neuron-provider-codex"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "OpenAI Codex (Responses API) provider for neuron-turn"
readme = "README.md"
categories = ["asynchronous", "web-programming::http-client"]
keywords = ["neuron", "ai", "agent", "openai", "codex"]

[dependencies]
neuron-turn = { path = "../../turn/neuron-turn", version = "0.4.0" }
layer0 = { path = "../../layer0", version = "0.4.0" }
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
  "stream",
] }
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust_decimal = { version = "1", features = ["serde-str"] }
tracing = "0.1"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
