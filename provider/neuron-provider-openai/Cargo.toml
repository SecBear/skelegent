[package]
name = "neuron-provider-openai"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "OpenAI API provider for neuron-turn"
readme = "README.md"
categories = ["asynchronous", "web-programming::http-client"]
keywords = ["neuron", "ai", "agent", "openai", "gpt"]

[dependencies]
neuron-turn = { path = "../../turn/neuron-turn", version = "0.4.0" }
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust_decimal = { version = "1", features = ["serde-str"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
layer0 = { path = "../../layer0", version = "0.4.0" }
neuron-op-react = { path = "../../op/neuron-op-react", version = "0.4.0" }
neuron-tool = { path = "../../turn/neuron-tool", version = "0.4.0" }
neuron-hooks = { path = "../../hooks/neuron-hooks", version = "0.4.0" }
neuron-context = { path = "../../turn/neuron-context", version = "0.4.0" }
neuron-state-memory = { path = "../../state/neuron-state-memory", version = "0.4.0" }
