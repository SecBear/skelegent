[package]
name = "neuron-op-react"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "ReAct operator for neuron — model + tools in a reasoning loop"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["neuron", "ai", "agent", "react", "operator"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.0" }
neuron-turn = { path = "../../turn/neuron-turn", version = "0.4.0" }
neuron-tool = { path = "../../turn/neuron-tool", version = "0.4.0" }
neuron-hooks = { path = "../../hooks/neuron-hooks", version = "0.4.0" }
async-trait = "0.1"
serde_json = "1"
rust_decimal = { version = "1", features = ["serde-str"] }

neuron-turn-kit = { path = "../../turn/neuron-turn-kit", version = "0.4.0" }
futures-util = { version = "0.3", default-features = false, features = [
  "alloc",
] }
[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
