[package]
name = "neuron-context-engine"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Composable context engine for neuron agents — assembly, inference, reaction"

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.0" }
neuron-turn = { path = "../../turn/neuron-turn", version = "0.4.0" }
neuron-tool = { path = "../../turn/neuron-tool", version = "0.4.0" }
neuron-context = { path = "../../turn/neuron-context", version = "0.4.0" }
async-trait = "0.1"
rust_decimal = { version = "1", features = ["serde-str"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["time"] }
tracing = "0.1"

[dev-dependencies]
layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.0" }
neuron-turn = { path = "../../turn/neuron-turn", features = [
  "test-utils",
], version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
