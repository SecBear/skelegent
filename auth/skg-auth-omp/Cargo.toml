[package]
name = "skg-auth-omp"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "OMP (Oh My Pi) credential provider — reads OAuth tokens from agent.db"
publish = false                                                                       # Not for crates.io, local tooling only

[dependencies]
skg-auth = { path = "../skg-auth", version = "0.4.1" }
skg-secret = { path = "../../secret/skg-secret", version = "0.4.1" }
async-trait = "0.1"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = [
  "rustls-tls",
  "json",
] }
tracing = "0.1"
tokio = { version = "1", features = ["sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"
