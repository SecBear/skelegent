[package]
name = "skg-auth"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Authentication provider traits for skelegent"
readme = "README.md"
categories = ["asynchronous", "authentication"]
keywords = ["skelegent", "ai", "agent", "authentication", "auth"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
skg-secret = { path = "../../secret/skg-secret", version = "0.4.1" }
async-trait = "0.1"
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
