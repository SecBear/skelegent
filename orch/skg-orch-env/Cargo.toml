[package]
name = "skg-orch-env"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Environment-aware Orchestrator — routes operators through Environment::run"

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"
tracing = "0.1"
tokio = { version = "1", features = ["rt"] }
serde_json = "1"

[dev-dependencies]
layer0 = { path = "../../layer0", version = "0.4.1", features = ["test-utils"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
