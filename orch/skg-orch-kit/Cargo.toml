[package]
name = "skg-orch-kit"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Unopinionated wiring kit for composing skelegent systems"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["skelegent", "ai", "agent", "orchestration", "composition"]

[dependencies]
async-trait = "0.1"
layer0 = { path = "../../layer0", version = "0.4.1" }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync"] }

skg-effects-core = { path = "../../effects/skg-effects-core", version = "0.4.1" }
skg-effects-local = { path = "../../effects/skg-effects-local", version = "0.4.1" }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
rust_decimal = "1"

layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.1" }
