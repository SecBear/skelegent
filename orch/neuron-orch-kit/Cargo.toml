[package]
name = "neuron-orch-kit"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Unopinionated wiring kit for composing neuron systems"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["neuron", "ai", "agent", "orchestration", "composition"]

[dependencies]
async-trait = "0.1"
layer0 = { path = "../../layer0", version = "0.4.0" }
serde_json = "1"
thiserror = "2"

neuron-effects-core = { path = "../../effects/neuron-effects-core", version = "0.4.0" }
neuron-effects-local = { path = "../../effects/neuron-effects-local", version = "0.4.0" }
[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
serde_json = "1"

layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.0" }
