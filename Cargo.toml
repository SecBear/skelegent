[package]
name = "neuron-workspace"
version = "0.4.0"
edition = "2024"
rust-version = "1.85"
publish = false

[workspace]
resolver = "3"
members = [
  "neuron",
  "layer0",
  "state/neuron-state-memory",
  "state/neuron-state-fs",
  "env/neuron-env-local",
  "orch/neuron-orch-local",
  "orch/neuron-orch-kit",
  "turn/neuron-tool",
  "turn/neuron-tool-macro",
  "turn/neuron-turn",
  "op/neuron-context-engine",
  "op/neuron-op-single-shot",
  "turn/neuron-context",
  "provider/neuron-provider-anthropic",
  "provider/neuron-provider-openai",
  "provider/neuron-provider-ollama",
  "turn/neuron-mcp",
  "secret/neuron-secret",
  "crypto/neuron-crypto",
  "auth/neuron-auth",
  "secret/neuron-secret-vault",
  "hooks/neuron-hook-security",
  "examples/custom_operator_barrier",
  "turn/neuron-turn-kit",
  "effects/neuron-effects-core",
  "effects/neuron-effects-local",
]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
repository = "https://github.com/secbear/neuron"
homepage = "https://github.com/secbear/neuron"

# Dependencies for workspace-level integration tests
[dev-dependencies]
layer0 = { path = "layer0", features = ["test-utils"], version = "0.4.0" }
neuron = { path = "neuron", version = "0.4.0" }
neuron-turn = { path = "turn/neuron-turn", features = [
  "test-utils",
], version = "0.4.0" }
neuron-context-engine = { path = "op/neuron-context-engine", version = "0.4.0" }
neuron-op-single-shot = { path = "op/neuron-op-single-shot", version = "0.4.0" }
neuron-context = { path = "turn/neuron-context", version = "0.4.0" }
neuron-tool = { path = "turn/neuron-tool", version = "0.4.0" }
neuron-state-memory = { path = "state/neuron-state-memory", version = "0.4.0" }
neuron-state-fs = { path = "state/neuron-state-fs", version = "0.4.0" }
neuron-provider-anthropic = { path = "provider/neuron-provider-anthropic", version = "0.4.0" }
neuron-provider-openai = { path = "provider/neuron-provider-openai", version = "0.4.0" }
neuron-provider-ollama = { path = "provider/neuron-provider-ollama", version = "0.4.0" }
neuron-orch-local = { path = "orch/neuron-orch-local", version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
async-trait = "0.1"
serde_json = "1"
rust_decimal = { version = "1", features = ["serde-str"] }
tempfile = "3"
