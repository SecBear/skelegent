[package]
name = "neuron-crypto-hardware"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Stub crypto provider for PKCS#11 / YubiKey PIV hardware tokens"
readme = "README.md"
categories = ["asynchronous", "cryptography"]
keywords = ["neuron", "ai", "agent", "pkcs11", "hsm"]

[dependencies]
neuron-crypto = { path = "../neuron-crypto", version = "0.4.0" }
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
