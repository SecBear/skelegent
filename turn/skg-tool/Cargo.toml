[package]
name = "skg-tool"
version = "1.0.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Tool interface and registry for skelegent"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["skelegent", "ai", "agent", "tools", "function-calling"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"
serde_json = "1"
thiserror = "2"
skg-tool-macro = { path = "../skg-tool-macro", version = "0.4.1", optional = true }

[features]
macros = ["dep:skg-tool-macro"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
