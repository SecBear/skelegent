[package]
name = "skg-mcp"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "MCP client and server bridging MCP tools with skelegent ToolRegistry"
readme = "README.md"
categories = ["asynchronous", "network-programming"]
keywords = ["skelegent", "ai", "agent", "mcp", "model-context"]

[dependencies]
skg-tool = { path = "../skg-tool", version = "0.4.1" }
layer0 = { path = "../../layer0", version = "0.4.1" }
rmcp = { version = "0.16", features = [
  "client",
  "server",
  "transport-child-process",
  "transport-io",
  "transport-streamable-http-client-reqwest",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["process", "io-std"] }
tracing = "0.1"

[dev-dependencies]
layer0 = { path = "../../layer0", version = "0.4.1", features = ["test-utils"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
async-trait = "0.1"
