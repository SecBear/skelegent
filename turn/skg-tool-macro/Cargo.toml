[package]
name = "skg-tool-macro"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Proc-macro for deriving ToolDyn from annotated async functions"
categories = ["asynchronous"]
keywords = ["skelegent", "ai", "agent", "tools", "proc-macro"]

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[dev-dependencies]
skg-tool = { path = "../skg-tool", version = "0.4.0" }
layer0 = { path = "../../layer0", version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
