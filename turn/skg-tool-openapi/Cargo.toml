[package]
name = "skg-tool-openapi"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Convert OpenAPI 3.x specs to ToolDyn implementations"
readme = "README.md"
categories = ["asynchronous", "network-programming"]
keywords = ["skelegent", "ai", "agent", "openapi", "tools"]

[dependencies]
skg-tool = { path = "../skg-tool", version = "0.4.1" }
layer0 = { path = "../../layer0", version = "0.4.1" }
openapiv3 = "2"
serde_json = "1"
serde_yaml = "0.9"
reqwest = { version = "0.12", features = ["json"] }
thiserror = "2"

[dev-dependencies]
layer0 = { path = "../../layer0", version = "0.4.1", features = ["test-utils"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
