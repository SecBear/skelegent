[package]
name = "skg-context"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Context strategy implementations for skg-turn"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["skelegent", "ai", "agent", "context", "llm"]

[dependencies]
skg-turn = { path = "../skg-turn", version = "0.4.0" }
layer0 = { path = "../../layer0", version = "0.4.0" }
serde_json = "1"

[dev-dependencies]
skg-state-memory = { path = "../../state/skg-state-memory", version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
async-trait = "0.1"
