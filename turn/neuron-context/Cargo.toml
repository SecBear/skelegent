[package]
name = "neuron-context"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Context strategy implementations for neuron-turn"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["neuron", "ai", "agent", "context", "llm"]

[dependencies]
neuron-turn = { path = "../neuron-turn", version = "0.4.0" }
layer0 = { path = "../../layer0", version = "0.4.0" }
serde_json = "1"

[dev-dependencies]
neuron-state-memory = { path = "../../state/neuron-state-memory", version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
async-trait = "0.1"
