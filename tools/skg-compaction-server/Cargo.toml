[package]
name = "skg-compaction-server"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "MCP server exposing context compaction operations as tools"

[[bin]]
name = "skg-compaction-server"
path = "src/main.rs"

[dependencies]
skg-context = { path = "../../turn/skg-context", version = "0.4.1" }
layer0 = { path = "../../layer0", version = "0.4.1" }
rmcp = { version = "0.16", features = ["server", "transport-io"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
thiserror = "2"
