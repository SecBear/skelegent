[package]
name = "skg-state-fs"
version = "1.0.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Filesystem-backed StateStore implementation for skelegent"
readme = "README.md"
categories = ["asynchronous", "filesystem"]
keywords = ["skelegent", "ai", "agent", "state", "storage"]

[features]
default = []
regex = ["dep:regex"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"
serde_json = "1"
tokio = { version = "1", features = ["fs", "sync"] }
regex = { version = "1", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
serde_json = "1"
tempfile = "3"
