[package]
name = "skg-state-proxy"
version = "0.4.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "gRPC proxy for StateStore — enables cross-container state access"

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"
tonic = { version = "0.13", features = ["transport"] }
prost = "0.13"
tokio = { version = "1", features = ["rt"] }
tracing = "0.1"
serde_json = "1"

[build-dependencies]
tonic-build = "0.13"
prost-build = "0.13"

[dev-dependencies]
layer0 = { path = "../../layer0", version = "0.4.1", features = ["test-utils"] }
skg-state-memory = { path = "../skg-state-memory", version = "0.4.1" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-stream = "0.1"
