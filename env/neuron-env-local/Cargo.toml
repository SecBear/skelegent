[package]
name = "neuron-env-local"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Local (passthrough) Environment implementation for neuron"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["neuron", "ai", "agent", "environment", "credentials"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.0" }
async-trait = "0.1"
neuron-secret = { path = "../../secret/neuron-secret", version = "0.4.0" }
serde_json = "1"

[dev-dependencies]
layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
