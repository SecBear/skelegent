[package]
name = "skg-env-docker"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Docker-backed Environment implementation for skelegent"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["skelegent", "ai", "agent", "environment", "docker"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.0" }
skg-secret = { path = "../../secret/skg-secret", version = "0.4.0" }
bollard = "0.18"
tonic = { version = "0.13", features = ["transport"] }
prost = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
url = "2"
tracing = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"

[build-dependencies]
tonic-build = "0.13"
prost-build = "0.13"

[dev-dependencies]
layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.0" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
