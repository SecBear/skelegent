[package]
name = "skg-env-local"
version = "1.0.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Local (passthrough) Environment implementation for skelegent"
readme = "README.md"
categories = ["asynchronous"]
keywords = ["skelegent", "ai", "agent", "environment", "credentials"]

[dependencies]
layer0 = { path = "../../layer0", version = "0.4.1" }
async-trait = "0.1"
skg-secret = { path = "../../secret/skg-secret", version = "0.4.1" }
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.1" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde_json = "1"
