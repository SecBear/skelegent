[package]
name = "neuron-effects-local"
version = "0.4.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Local effect executor implementation using StateStore and Orchestrator"

[dependencies]
async-trait = "0.1"
layer0 = { path = "../../layer0", version = "0.4.0" }
serde_json = "1"
tracing = "0.1"
thiserror = "2"

neuron-effects-core = { path = "../neuron-effects-core", version = "0.4.0" }

[dev-dependencies]
async-trait = "0.1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
serde_json = "1"
layer0 = { path = "../../layer0", features = ["test-utils"], version = "0.4.0" }
neuron-effects-core = { path = "../neuron-effects-core", version = "0.4.0" }
